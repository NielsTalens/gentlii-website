    <style
       id="product-guard-animations"><![CDATA[
      .flow-line {
        animation: flow-dash 4.6s linear infinite;
      }

      .card-accent {
        animation: accent-glow 2.8s ease-in-out infinite;
        opacity: 0.98;
      }

      .card-accent-glow {
        animation: accent-halo 2.8s ease-in-out infinite;
      }

      .validation-accent {
        animation: validation-glow 2.4s ease-in-out infinite;
        filter: url(#soft-glow-strong);
      }

      #rect42,
      #line48-glow,
      #line49 {
        animation-delay: 0.35s;
      }

      #rect43,
      #line50-glow,
      #line51 {
        animation-delay: 0.7s;
      }

      #line52-glow,
      #line53 {
        animation-delay: 1.05s;
      }

      #line54-glow,
      #line55 {
        animation-delay: 1.4s;
      }

      @keyframes flow-dash {
        from {
          stroke-dashoffset: 0;
        }

        to {
          stroke-dashoffset: -20;
        }
      }

      @keyframes accent-glow {
        0%, 100% {
          opacity: 0.95;
        }

        50% {
          opacity: 1;
        }
      }

      @keyframes accent-halo {
        0%, 100% {
          opacity: 0.2;
        }

        50% {
          opacity: 0.58;
        }
      }

      @keyframes validation-glow {
        0%, 100% {
          opacity: 0.92;
        }

        50% {
          opacity: 1;
        }
      }
    ]]></style>
